[unstable]
codegen-backend = true

[build]
rustc-wrapper = "sccache"

[profile.dev]
codegen-backend = "cranelift"

[profile.dev.package."*"]
codegen-backend = "cranelift"

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
    "-Zshare-generics=y",
    "-C", "link-arg=-fuse-ld=mold"
]
